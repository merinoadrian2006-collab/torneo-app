<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>TorneoApp</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <a class="app-logo" href="/">
            <img src="logo.svg" class="logo-icon" alt="TorneoApp">
            <span class="logo-text">Torneo<span>App</span></span>
        </a>
        <a class="header-back" href="/">← Volver</a>
    </header>

    <!-- Share bar (private view only) -->
    <div id="shareBar"></div>

    <div class="main-container torneo-page">

        <!-- ── BANNER ──────────────────────────────────── -->
        <div class="torneo-banner">
            <div class="torneo-banner-eyebrow">— TORNEO</div>
            <h1 class="torneo-banner-name" id="torneoTitulo">…</h1>
            <!-- Leader card injected by JS -->
            <div id="leaderCard" style="display:none"></div>
        </div>

        <!-- ── EQUIPOS ─────────────────────────────────── -->
        <div id="editControls">
            <div class="section-header" style="margin-top:40px">
                <h2 id="sectionEquiposLabel">Participantes</h2>
            </div>
            <div class="form-row">
                <input type="text" id="equipoName" placeholder="Nombre del participante..." maxlength="40">
                <button class="btn-primary" id="btnEquipo">+ Añadir</button>
            </div>
        </div>

        <!-- Equipos grid -->
        <div id="equiposList"></div>

        <!-- ── REGISTRAR PARTIDO ───────────────────────── -->
        <div id="editControls2">
            <div class="section-header" style="margin-top:40px">
                <h2>Registrar Partido</h2>
            </div>
            <div class="partido-form">
                <div class="partido-form-teams">
                    <div class="form-field">
                        <label class="form-label" id="labelLocal">Local</label>
                        <select id="teamA" class="select-input"></select>
                    </div>
                    <div class="partido-form-vs">
                        <div class="vs-inputs">
                            <input type="number" id="scoreA" value="0" min="0" max="999" class="score-input">
                            <span class="vs-sep" id="vsScoreLabel">—</span>
                            <input type="number" id="scoreB" value="0" min="0" max="999" class="score-input">
                        </div>
                    </div>
                    <div class="form-field right">
                        <label class="form-label" id="labelVisitante">Visitante</label>
                        <select id="teamB" class="select-input"></select>
                    </div>
                </div>
                <button class="btn-primary btn-full" id="btnPartido">Guardar Resultado</button>
            </div>
        </div>

        <!-- ── DYNAMIC SECTIONS (injected by JS) ──────── -->
        <div id="tablaClasificacion"></div>
        <div id="estadisticasSection"></div>
        <div id="playoffSection"></div>
        <div id="partidosSection"></div>

        <div style="margin-top:60px"></div>
    </div>

    <footer class="app-footer">
        <span class="footer-brand">Torneo<span>App</span></span>
        <span class="footer-copy">© 2025 TorneoApp. Todos los derechos reservados.</span>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="torneo.js"></script>
</body>
</html>
